<section class="relative px-6 md:px-16 py-24 bg-white dark:bg-slate-900 overflow-hidden text-gray-800 dark:text-white transition-colors duration-250">
  
  <!-- Subtle Gradient Background -->
  <div class="absolute top-1/3 left-1/2 -translate-x-1/2 w-[500px] h-[500px] rounded-full bg-blue-600/[0.03] dark:bg-sky-500/[0.01] blur-[120px] pointer-events-none"></div>

  <!-- TITLE -->
  <div class="text-center mb-16 space-y-4">
    <p class="text-blue-600 dark:text-sky-500 font-extrabold text-xs md:text-sm tracking-widest uppercase">
      Our Programs
    </p>
    <h2 class="text-3xl md:text-4xl lg:text-5xl font-black tracking-tight text-gray-955 dark:text-white">
      Cutting-Edge AI & Foundation Courses
    </h2>
    <div class="w-12 h-1 bg-blue-600 dark:bg-sky-500 mx-auto rounded-full"></div>
  </div>

  <!-- CARDS -->
  <div class="max-w-7xl mx-auto">
    @if (loading) {
      <div class="flex justify-center items-center py-20">
        <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-blue-600 dark:border-sky-500"></div>
      </div>
    } @else if (courses.length === 0) {
      <div class="text-center text-gray-555 dark:text-slate-500 py-10">No programs available at the moment.</div>
    } @else {
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
        @for (course of courses; track course.id || $index) {
          <div class="group relative bg-slate-50 dark:bg-slate-800 border border-gray-200/60 dark:border-slate-700/80 p-8 rounded-[2rem] hover:border-blue-500/30 dark:hover:border-sky-500/20 hover:shadow-[0_20px_50px_rgba(37,99,235,0.05)] hover:-translate-y-1.5 transition-all duration-300 flex flex-col justify-between overflow-hidden">
            
            <!-- Hover Glow Border -->
            <div class="absolute -inset-px rounded-[2rem] bg-gradient-to-tr from-blue-600 to-sky-555 opacity-0 group-hover:opacity-10 transition-opacity duration-300 pointer-events-none"></div>

            <div>
              <!-- ICON & LEVEL -->
              <div class="flex items-center justify-between mb-8">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-blue-50 dark:bg-blue-950/20 text-blue-600 dark:text-sky-400 group-hover:scale-105 group-hover:bg-blue-600 group-hover:text-white transition-all duration-300 text-3xl">
                  <i [class]="getIconClass(course)"></i>
                </div>
                <span class="text-[10px] bg-blue-50 dark:bg-blue-950/20 border border-blue-200/30 dark:border-blue-900/30 px-3 py-1 rounded-full text-blue-600 dark:text-sky-400 font-extrabold uppercase tracking-wider">
                  {{course.level}}
                </span>
              </div>

              <!-- TITLE -->
              <h3 class="text-xl md:text-2xl font-bold mb-4 leading-snug text-gray-955 dark:text-white group-hover:text-blue-600 dark:group-hover:text-sky-500 transition-colors duration-250">
                {{course.title}}
              </h3>

              <!-- DESCRIPTION -->
              <p class="text-gray-600 dark:text-slate-350 leading-relaxed text-sm md:text-base line-clamp-3 mb-6">
                {{course.description}}
              </p>
            </div>

            <!-- ACTION LINK -->
            <div class="pt-4 border-t border-gray-200/40 dark:border-slate-700/50 flex items-center justify-between text-xs font-bold text-gray-955 dark:text-white">
              <span>View Details</span>
              <span class="w-8 h-8 rounded-full bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-700 flex items-center justify-center text-blue-600 dark:text-sky-450 group-hover:translate-x-1 group-hover:bg-blue-600 group-hover:text-white group-hover:border-blue-600 transition-all duration-300">
                <i class="fa-solid fa-arrow-right"></i>
              </span>
            </div>
          </div>
        }
      </div>
    }
  </div>
</section>
