<section class="relative bg-slate-50 dark:bg-[#080809] text-gray-800 dark:text-white px-6 md:px-16 py-24 transition-colors duration-250">
  
  <!-- Glowing Background Orb -->
  <div class="absolute bottom-1/4 left-10 w-80 h-80 rounded-full bg-red-600/5 dark:bg-red-500/[0.02] blur-[90px] pointer-events-none"></div>

  <!-- TITLE -->
  <div class="text-center mb-16 space-y-4">
    <p class="text-red-600 dark:text-red-500 font-extrabold text-xs md:text-sm tracking-widest uppercase">
      Why Choose Us
    </p>
    <h2 class="text-3xl md:text-4xl lg:text-5xl font-black tracking-tight text-gray-950 dark:text-white">
      The Divijix Academy Difference
    </h2>
    <div class="w-12 h-1 bg-red-600 dark:bg-red-500 mx-auto rounded-full"></div>
  </div>

  <!-- FEATURE CARDS -->
  <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
    @for (item of features; track $index) {
      <div class="group relative bg-white dark:bg-[#111112] p-8 rounded-[2rem] border border-gray-200/60 dark:border-zinc-800/80 hover:border-red-500/30 dark:hover:border-red-500/20 hover:shadow-[0_20px_50px_rgba(239,68,68,0.05)] hover:-translate-y-1.5 transition-all duration-300 min-h-[320px] flex flex-col justify-between overflow-hidden">
        
        <!-- Hover Glow Border -->
        <div class="absolute -inset-px rounded-[2rem] bg-gradient-to-tr from-red-600 to-rose-500 opacity-0 group-hover:opacity-10 transition-opacity duration-300 pointer-events-none"></div>

        <div>
          <!-- ICON -->
          <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-red-50 dark:bg-red-950/20 text-red-600 dark:text-red-500 mb-8 group-hover:scale-110 group-hover:bg-red-600 group-hover:text-white transition-all duration-300 text-3xl">
            <i [class]="item.iconClass"></i>
          </div>

          <!-- TITLE -->
          <h3 class="text-xl font-bold mb-4 text-gray-955 dark:text-white">
            {{item.title}}
          </h3>

          <!-- DESCRIPTION -->
          <p class="text-gray-600 dark:text-zinc-400 leading-relaxed text-sm">
            {{item.description}}
          </p>
        </div>
      </div>
    }
  </div>
</section>
